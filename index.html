<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TETRİS</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #0f0f1a;
    --border: #1a1a2e;
    --glow-cyan: #00f5ff;
    --glow-pink: #ff006e;
    --glow-yellow: #ffbe0b;
    --text: #e0e0ff;
    --dim: #4a4a6a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Press Start 2P', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 100;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 99;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  h1 {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(1rem, 4vw, 2rem);
    letter-spacing: 0.3em;
    color: var(--glow-cyan);
    text-shadow: 0 0 10px var(--glow-cyan), 0 0 30px var(--glow-cyan), 0 0 60px rgba(0,245,255,0.3);
    margin-bottom: 12px;
    animation: flicker 4s infinite;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
    98% { opacity: 0.6; }
    99% { opacity: 1; }
  }

  .game-wrapper {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .side-panel {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 90px;
  }

  .panel-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 6px;
    text-align: center;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5), 0 0 10px rgba(0,245,255,0.05);
  }

  .panel-label {
    font-size: 0.4rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }

  .panel-value {
    font-size: 0.6rem;
    color: var(--glow-cyan);
    text-shadow: 0 0 8px var(--glow-cyan);
    word-break: break-all;
  }

  #next-canvas { display: block; margin: 0 auto; }

  #game-canvas {
    display: block;
    border: 1px solid rgba(0,245,255,0.2);
    box-shadow: 0 0 0 1px rgba(0,245,255,0.1), 0 0 20px rgba(0,245,255,0.1), 0 0 60px rgba(0,245,255,0.05);
    border-radius: 2px;
    image-rendering: pixelated;
  }

  .touch-controls {
    display: none;
    margin-top: 14px;
    gap: 10px;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 400px;
  }

  .touch-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    width: 100%;
  }

  .btn {
    background: rgba(0, 245, 255, 0.08);
    border: 2px solid rgba(0,245,255,0.35);
    color: var(--glow-cyan);
    font-family: 'Press Start 2P', monospace;
    font-size: 0.75rem;
    padding: 18px 0;
    border-radius: 10px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    flex: 1;
    text-align: center;
    box-shadow: 0 0 12px rgba(0,245,255,0.1), inset 0 0 10px rgba(0,245,255,0.05);
    transition: background 0.08s, box-shadow 0.08s, transform 0.08s;
    min-width: 70px;
    max-width: 110px;
  }

  .btn:active {
    background: rgba(0,245,255,0.22);
    box-shadow: 0 0 24px rgba(0,245,255,0.5);
    transform: scale(0.94);
  }

  .btn-rotate {
    background: rgba(255,0,110,0.1);
    border-color: rgba(255,0,110,0.5);
    color: var(--glow-pink);
    box-shadow: 0 0 12px rgba(255,0,110,0.15), inset 0 0 10px rgba(255,0,110,0.05);
    font-size: 0.7rem;
    padding: 18px 0;
    flex: 1.4;
    max-width: 150px;
  }
  .btn-rotate:active {
    background: rgba(255,0,110,0.28);
    box-shadow: 0 0 28px rgba(255,0,110,0.5);
    transform: scale(0.94);
  }

  .btn-drop {
    background: rgba(255,190,11,0.08);
    border-color: rgba(255,190,11,0.4);
    color: var(--glow-yellow);
    box-shadow: 0 0 12px rgba(255,190,11,0.1);
    flex: 1.4;
    max-width: 150px;
    font-size: 0.65rem;
  }
  .btn-drop:active {
    background: rgba(255,190,11,0.22);
    box-shadow: 0 0 28px rgba(255,190,11,0.4);
    transform: scale(0.94);
  }

  .music-btn {
    position: fixed;
    top: 12px;
    right: 16px;
    background: var(--panel);
    border: 1px solid rgba(0,245,255,0.2);
    color: var(--glow-cyan);
    font-family: 'Press Start 2P', monospace;
    font-size: 0.45rem;
    padding: 7px 10px;
    border-radius: 4px;
    cursor: pointer;
    z-index: 200;
    letter-spacing: 0.05em;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    z-index: 50;
    gap: 16px;
    backdrop-filter: blur(2px);
  }

  .overlay h2 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(0.9rem, 3vw, 1.4rem);
    color: var(--glow-pink);
    text-shadow: 0 0 20px var(--glow-pink);
    text-align: center;
  }

  .overlay p {
    font-size: 0.45rem;
    color: var(--dim);
    text-align: center;
    line-height: 2.2;
  }

  .start-btn {
    background: transparent;
    border: 2px solid var(--glow-cyan);
    color: var(--glow-cyan);
    font-family: 'Press Start 2P', monospace;
    font-size: 0.6rem;
    padding: 14px 22px;
    cursor: pointer;
    letter-spacing: 0.15em;
    text-shadow: 0 0 10px var(--glow-cyan);
    box-shadow: 0 0 20px rgba(0,245,255,0.2), inset 0 0 20px rgba(0,245,255,0.05);
    transition: all 0.2s;
    border-radius: 2px;
    animation: pulse-border 2s infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 10px rgba(0,245,255,0.2), inset 0 0 10px rgba(0,245,255,0.05); }
    50% { box-shadow: 0 0 30px rgba(0,245,255,0.5), inset 0 0 20px rgba(0,245,255,0.1); }
  }

  .start-btn:hover { background: rgba(0,245,255,0.1); }

  .score-display {
    font-size: 0.8rem;
    color: var(--glow-yellow);
    text-shadow: 0 0 10px var(--glow-yellow);
  }

  .high-score-badge {
    font-size: 0.4rem;
    color: var(--glow-pink);
    text-shadow: 0 0 8px var(--glow-pink);
    animation: pulse-border 1s infinite;
  }

  #particle-canvas {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  @media (max-width: 600px) {
    .touch-controls { display: flex; }
    .side-panel { width: 68px; }
    .panel-label { font-size: 0.32rem; }
    .panel-value { font-size: 0.48rem; }
  }
</style>
</head>
<body>
<div class="grid-bg"></div>

<button class="music-btn" id="music-btn">🔊 MÜZİK</button>

<h1>TETRİS</h1>

<div class="game-wrapper">
  <div class="side-panel">
    <div class="panel-box">
      <div class="panel-label">SKOR</div>
      <div class="panel-value" id="score-display">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">EN İYİ</div>
      <div class="panel-value" id="hi-display">0</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">SEVİYE</div>
      <div class="panel-value" id="level-display">1</div>
    </div>
    <div class="panel-box">
      <div class="panel-label">SATIR</div>
      <div class="panel-value" id="lines-display">0</div>
    </div>
  </div>

  <div style="position:relative;">
    <canvas id="game-canvas"></canvas>
    <canvas id="particle-canvas"></canvas>

    <div class="overlay" id="start-overlay">
      <h2>TETRİS</h2>
      <p>← → : Hareket<br>↑ / Z : Döndür<br>↓ : Hızlı İndir<br>SPACE : Anlık Düşür<br>P : Duraklat</p>
      <button class="start-btn" id="start-btn">BAŞLA</button>
    </div>

    <div class="overlay" id="gameover-overlay" style="display:none;">
      <h2>OYUN BİTTİ</h2>
      <div class="score-display" id="final-score">0</div>
      <div class="high-score-badge" id="new-record" style="display:none;">★ YENİ REKOR! ★</div>
      <button class="start-btn" id="restart-btn">TEKRAR</button>
    </div>

    <div class="overlay" id="pause-overlay" style="display:none;">
      <h2>DURAKLATILDI</h2>
      <p>P tuşuna bas<br>devam etmek için</p>
    </div>
  </div>

  <div class="side-panel">
    <div class="panel-box">
      <div class="panel-label">SONRAKI</div>
      <canvas id="next-canvas" width="72" height="72"></canvas>
    </div>
    <div class="panel-box" style="margin-top:6px;">
      <div class="panel-label" style="font-size:0.3rem; line-height:2;">
        ← → HAR.<br>↑ DÖN.<br>↓ HIZLI<br>SPC DÜŞÜR<br>P DURAKLAT
      </div>
    </div>
  </div>
</div>

<div class="touch-controls" id="touch-controls">
  <div class="touch-row">
    <button class="btn btn-rotate" id="btn-rotate">↻ DÖNDÜR</button>
    <button class="btn btn-drop" id="btn-drop">⬇ ANİK DÜŞÜR</button>
  </div>
  <div class="touch-row">
    <button class="btn" id="btn-left">◀ SOL</button>
    <button class="btn" id="btn-down">▼ HIZLI</button>
    <button class="btn" id="btn-right">SAĞ ▶</button>
  </div>
</div>

<script>
let audioCtx = null;
let musicOn = false;
let musicNodes = [];
let scheduleTimer = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

const THEME = [
  ['E5',0.25],['B4',0.125],['C5',0.125],['D5',0.25],['C5',0.125],['B4',0.125],
  ['A4',0.25],['A4',0.125],['C5',0.125],['E5',0.25],['D5',0.125],['C5',0.125],
  ['B4',0.375],['C5',0.125],['D5',0.25],['E5',0.25],
  ['C5',0.25],['A4',0.25],['A4',0.5],
  ['D5',0.375],['F5',0.125],['A5',0.25],['G5',0.125],['F5',0.125],
  ['E5',0.375],['C5',0.125],['E5',0.25],['D5',0.125],['C5',0.125],
  ['B4',0.25],['B4',0.125],['C5',0.125],['D5',0.25],['E5',0.25],
  ['C5',0.25],['A4',0.25],['A4',0.5],
  ['E5',0.25],['B4',0.125],['C5',0.125],['D5',0.25],['C5',0.125],['B4',0.125],
  ['A4',0.25],['A4',0.125],['C5',0.125],['E5',0.25],['D5',0.125],['C5',0.125],
  ['B4',0.375],['C5',0.125],['D5',0.25],['E5',0.25],
  ['C5',0.25],['A4',0.25],['A4',0.5],
  ['D5',0.375],['F5',0.125],['A5',0.25],['G5',0.125],['F5',0.125],
  ['E5',0.375],['C5',0.125],['E5',0.25],['D5',0.125],['C5',0.125],
  ['B4',0.25],['B4',0.125],['C5',0.125],['D5',0.25],['E5',0.25],
  ['C5',0.25],['A4',0.25],['A4',0.5],
];

const NOTE_FREQ = {
  'A4':440,'B4':493.88,'C5':523.25,'D5':587.33,'E5':659.25,
  'F5':698.46,'G5':783.99,'A5':880,'B5':987.77,
};

const BPM = 160;
const BEAT = 60 / BPM;

function playMusic() {
  if (!musicOn) return;
  const ac = getAudio();
  stopMusic();
  let t = ac.currentTime + 0.05;
  const masterGain = ac.createGain();
  masterGain.gain.setValueAtTime(0.18, t);
  masterGain.connect(ac.destination);
  musicNodes.push(masterGain);

  function scheduleLoop() {
    if (!musicOn) return;
    const loopStart = t;
    THEME.forEach(([note, dur]) => {
      const freq = NOTE_FREQ[note];
      if (!freq) { t += dur * BEAT * 4; return; }
      const osc = ac.createOscillator();
      osc.type = 'square';
      osc.frequency.setValueAtTime(freq, t);
      const env = ac.createGain();
      env.gain.setValueAtTime(0, t);
      env.gain.linearRampToValueAtTime(0.6, t + 0.01);
      env.gain.setValueAtTime(0.6, t + dur * BEAT * 4 * 0.7);
      env.gain.linearRampToValueAtTime(0, t + dur * BEAT * 4 * 0.95);
      osc.connect(env);
      env.connect(masterGain);
      osc.start(t);
      osc.stop(t + dur * BEAT * 4);
      musicNodes.push(osc, env);
      t += dur * BEAT * 4;
    });
    const loopDur = t - loopStart;
    scheduleTimer = setTimeout(scheduleLoop, (loopDur - 1) * 1000);
  }
  scheduleLoop();
}

function stopMusic() {
  if (scheduleTimer) clearTimeout(scheduleTimer);
  musicNodes.forEach(n => { try { n.stop && n.stop(); n.disconnect && n.disconnect(); } catch(e){} });
  musicNodes = [];
}

document.getElementById('music-btn').addEventListener('click', () => {
  musicOn = !musicOn;
  document.getElementById('music-btn').textContent = musicOn ? '🔊 MÜZİK' : '🔇 MÜZİK';
  if (musicOn) playMusic();
  else stopMusic();
});

function sfx(type) {
  if (!audioCtx) return;
  const ac = audioCtx;
  const g = ac.createGain();
  g.connect(ac.destination);
  if (type === 'move') {
    const o = ac.createOscillator();
    o.type = 'square'; o.frequency.setValueAtTime(220, ac.currentTime);
    g.gain.setValueAtTime(0.06, ac.currentTime);
    g.gain.linearRampToValueAtTime(0, ac.currentTime + 0.05);
    o.connect(g); o.start(); o.stop(ac.currentTime + 0.05);
  } else if (type === 'rotate') {
    const o = ac.createOscillator();
    o.type = 'square'; o.frequency.setValueAtTime(330, ac.currentTime);
    o.frequency.linearRampToValueAtTime(500, ac.currentTime + 0.08);
    g.gain.setValueAtTime(0.08, ac.currentTime);
    g.gain.linearRampToValueAtTime(0, ac.currentTime + 0.08);
    o.connect(g); o.start(); o.stop(ac.currentTime + 0.08);
  } else if (type === 'land') {
    const o = ac.createOscillator();
    o.type = 'square'; o.frequency.setValueAtTime(150, ac.currentTime);
    o.frequency.linearRampToValueAtTime(80, ac.currentTime + 0.1);
    g.gain.setValueAtTime(0.12, ac.currentTime);
    g.gain.linearRampToValueAtTime(0, ac.currentTime + 0.1);
    o.connect(g); o.start(); o.stop(ac.currentTime + 0.1);
  } else if (type === 'clear') {
    [0, 0.08, 0.16, 0.24].forEach((d, i) => {
      const o = ac.createOscillator();
      o.type = 'square';
      const freqs = [440, 550, 660, 880];
      o.frequency.setValueAtTime(freqs[i], ac.currentTime + d);
      g.gain.setValueAtTime(0.15, ac.currentTime + d);
      g.gain.linearRampToValueAtTime(0, ac.currentTime + d + 0.12);
      o.connect(g); o.start(ac.currentTime + d); o.stop(ac.currentTime + d + 0.12);
    });
  } else if (type === 'gameover') {
    [0,0.1,0.2,0.3,0.4].forEach((d, i) => {
      const o = ac.createOscillator();
      o.type = 'sawtooth';
      const f = [400,350,300,250,180];
      o.frequency.setValueAtTime(f[i], ac.currentTime + d);
      g.gain.setValueAtTime(0.15, ac.currentTime + d);
      g.gain.linearRampToValueAtTime(0, ac.currentTime + d + 0.15);
      o.connect(g); o.start(ac.currentTime + d); o.stop(ac.currentTime + d + 0.15);
    });
  }
}

const pCanvas = document.getElementById('particle-canvas');
const pCtx = pCanvas.getContext('2d');
let particles = [];

function resizeParticleCanvas() {
  const gc = document.getElementById('game-canvas');
  pCanvas.width = gc.width;
  pCanvas.height = gc.height;
}

function spawnRowParticles(rows, blockSize) {
  rows.forEach(r => {
    for (let c = 0; c < COLS; c++) {
      const color = board[r][c] || '#ffffff';
      const cx = (c + 0.5) * blockSize;
      const cy = (r + 0.5) * blockSize;
      for (let i = 0; i < 18; i++) {
        const angle = (Math.PI * 2 / 18) * i + Math.random() * 0.3;
        const speed = 2 + Math.random() * 5;
        particles.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 1,
          life: 1,
          decay: 0.025 + Math.random() * 0.03,
          size: 3 + Math.random() * 5,
          color, glow: color,
          type: Math.random() > 0.5 ? 'square' : 'circle',
        });
      }
      for (let i = 0; i < 6; i++) {
        particles.push({
          x: cx + (Math.random() - 0.5) * blockSize,
          y: cy + (Math.random() - 0.5) * blockSize,
          vx: (Math.random() - 0.5) * 3,
          vy: -1 - Math.random() * 3,
          life: 1,
          decay: 0.04 + Math.random() * 0.04,
          size: 1 + Math.random() * 2,
          color: '#ffffff', glow: '#ffffff',
          type: 'circle',
        });
      }
    }
  });
}

function updateParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.18; p.vx *= 0.97;
    p.life -= p.decay;
    pCtx.globalAlpha = Math.max(0, p.life);
    pCtx.shadowColor = p.glow;
    pCtx.shadowBlur = 10;
    pCtx.fillStyle = p.color;
    if (p.type === 'square') {
      pCtx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    } else {
      pCtx.beginPath();
      pCtx.arc(p.x, p.y, p.size/2, 0, Math.PI*2);
      pCtx.fill();
    }
  });
  pCtx.globalAlpha = 1;
  pCtx.shadowBlur = 0;
}

const COLS = 10, ROWS = 20;
const BLOCK = (() => {
  const side = Math.min(
    Math.floor((window.innerWidth * 0.52) / COLS),
    Math.floor((window.innerHeight * 0.65) / ROWS),
    30
  );
  return Math.max(side, 20);
})();

const canvas = document.getElementById('game-canvas');
canvas.width = COLS * BLOCK;
canvas.height = ROWS * BLOCK;
const ctx = canvas.getContext('2d');

const nextCanvas = document.getElementById('next-canvas');
const nextCtx = nextCanvas.getContext('2d');

resizeParticleCanvas();

const PIECES = [
  { shape: [[1,1,1,1]], color: '#00f5ff', glow: '#00f5ff' },
  { shape: [[1,1],[1,1]], color: '#ffbe0b', glow: '#ffbe0b' },
  { shape: [[0,1,0],[1,1,1]], color: '#cc00ff', glow: '#dd00ff' },
  { shape: [[1,0],[1,0],[1,1]], color: '#ff6b00', glow: '#ff8800' },
  { shape: [[0,1],[0,1],[1,1]], color: '#0088ff', glow: '#00aaff' },
  { shape: [[0,1,1],[1,1,0]], color: '#00ff88', glow: '#00ff88' },
  { shape: [[1,1,0],[0,1,1]], color: '#ff006e', glow: '#ff006e' },
];

let board, current, next, score, lines, level, dropInterval, lastTime, animId;
let gameRunning = false, paused = false;
let highScore = parseInt(localStorage.getItem('tetris_hi') || '0');
let flashRows = [];

document.getElementById('hi-display').textContent = highScore;

function createBoard() {
  return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
}

function randomPiece() {
  const p = PIECES[Math.floor(Math.random() * PIECES.length)];
  return {
    shape: p.shape.map(r => [...r]),
    color: p.color, glow: p.glow,
    x: Math.floor((COLS - p.shape[0].length) / 2), y: 0
  };
}

function rotate(shape) {
  return shape[0].map((_, i) => shape.map(r => r[i])).reverse();
}

function valid(shape, ox, oy) {
  for (let r = 0; r < shape.length; r++)
    for (let c = 0; c < shape[r].length; c++) {
      if (!shape[r][c]) continue;
      const nx = ox + c, ny = oy + r;
      if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
      if (ny >= 0 && board[ny][nx]) return false;
    }
  return true;
}

function place() {
  for (let r = 0; r < current.shape.length; r++)
    for (let c = 0; c < current.shape[r].length; c++) {
      if (!current.shape[r][c]) continue;
      const ny = current.y + r;
      if (ny < 0) { endGame(); return; }
      board[ny][current.x + c] = current.color;
    }
  sfx('land');
  clearLines();
  current = next;
  next = randomPiece();
  if (!valid(current.shape, current.x, current.y)) { endGame(); return; }
  drawNext();
}

function clearLines() {
  const full = [];
  for (let r = ROWS - 1; r >= 0; r--)
    if (board[r].every(c => c !== null)) full.push(r);
  if (!full.length) return;
  sfx('clear');
  spawnRowParticles(full, BLOCK);
  flashRows = [...full];
  setTimeout(() => {
    full.sort((a, b) => b - a);
    for (const r of full) board.splice(r, 1);
    for (let i = 0; i < full.length; i++) board.unshift(Array(COLS).fill(null));
    flashRows = [];
    const pts = [0, 100, 300, 500, 800];
    score += (pts[full.length] || 800) * level;
    lines += full.length;
    level = Math.floor(lines / 10) + 1;
    dropInterval = Math.max(80, 800 - (level - 1) * 70);
    document.getElementById('score-display').textContent = score;
    document.getElementById('level-display').textContent = level;
    document.getElementById('lines-display').textContent = lines;
  }, 200);
}

function drawBlock(c, r, color, glow, context, size) {
  const x = c * size, y = r * size, s = size;
  context.shadowColor = glow || color;
  context.shadowBlur = 14;
  context.fillStyle = color;
  context.fillRect(x + 1, y + 1, s - 2, s - 2);
  context.shadowBlur = 0;
  const grad = context.createLinearGradient(x, y, x + s, y + s);
  grad.addColorStop(0, 'rgba(255,255,255,0.28)');
  grad.addColorStop(1, 'rgba(0,0,0,0.22)');
  context.fillStyle = grad;
  context.fillRect(x + 1, y + 1, s - 2, s - 2);
  context.strokeStyle = 'rgba(255,255,255,0.18)';
  context.lineWidth = 1;
  context.strokeRect(x + 1.5, y + 1.5, s - 3, s - 3);
}

function drawGhost() {
  let gy = current.y;
  while (valid(current.shape, current.x, gy + 1)) gy++;
  if (gy === current.y) return;
  ctx.globalAlpha = 0.15;
  for (let r = 0; r < current.shape.length; r++)
    for (let c = 0; c < current.shape[r].length; c++) {
      if (!current.shape[r][c]) continue;
      ctx.fillStyle = current.color;
      ctx.fillRect((current.x + c) * BLOCK + 1, (gy + r) * BLOCK + 1, BLOCK - 2, BLOCK - 2);
    }
  ctx.globalAlpha = 1;
}

function draw() {
  ctx.fillStyle = '#060610';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = 'rgba(0,245,255,0.04)';
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath(); ctx.moveTo(c * BLOCK, 0); ctx.lineTo(c * BLOCK, canvas.height); ctx.stroke();
  }
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath(); ctx.moveTo(0, r * BLOCK); ctx.lineTo(canvas.width, r * BLOCK); ctx.stroke();
  }
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      if (!board[r][c]) continue;
      if (flashRows.includes(r)) {
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 30;
        ctx.fillRect(c * BLOCK, r * BLOCK, BLOCK, BLOCK);
        ctx.shadowBlur = 0;
      } else {
        drawBlock(c, r, board[r][c], board[r][c], ctx, BLOCK);
      }
    }
  if (gameRunning && !paused) drawGhost();
  if (gameRunning)
    for (let r = 0; r < current.shape.length; r++)
      for (let c = 0; c < current.shape[r].length; c++) {
        if (!current.shape[r][c]) continue;
        drawBlock(current.x + c, current.y + r, current.color, current.glow, ctx, BLOCK);
      }
  updateParticles();
}

function drawNext() {
  const s = next.shape, bs = 14;
  nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
  nextCtx.fillStyle = '#060610';
  nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
  const ox = Math.floor((nextCanvas.width - s[0].length * bs) / 2);
  const oy = Math.floor((nextCanvas.height - s.length * bs) / 2);
  for (let r = 0; r < s.length; r++)
    for (let c = 0; c < s[r].length; c++) {
      if (!s[r][c]) continue;
      nextCtx.shadowColor = next.glow;
      nextCtx.shadowBlur = 8;
      nextCtx.fillStyle = next.color;
      nextCtx.fillRect(ox + c * bs + 1, oy + r * bs + 1, bs - 2, bs - 2);
      nextCtx.shadowBlur = 0;
    }
}

let dropAcc = 0;
function loop(ts) {
  if (!lastTime) lastTime = ts;
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  if (!paused) {
    dropAcc += dt;
    if (dropAcc >= dropInterval) {
      dropAcc = 0;
      if (valid(current.shape, current.x, current.y + 1)) current.y++;
      else place();
    }
  }
  draw();
  animId = requestAnimationFrame(loop);
}

function startGame() {
  board = createBoard();
  score = 0; lines = 0; level = 1;
  dropInterval = 800; dropAcc = 0; lastTime = 0;
  flashRows = []; paused = false; particles = [];
  current = randomPiece();
  next = randomPiece();
  gameRunning = true;
  document.getElementById('score-display').textContent = '0';
  document.getElementById('level-display').textContent = '1';
  document.getElementById('lines-display').textContent = '0';
  document.getElementById('start-overlay').style.display = 'none';
  document.getElementById('gameover-overlay').style.display = 'none';
  document.getElementById('pause-overlay').style.display = 'none';
  if (animId) cancelAnimationFrame(animId);
  drawNext();
  animId = requestAnimationFrame(loop);
  if (musicOn) { stopMusic(); playMusic(); }
  getAudio();
}

function endGame() {
  gameRunning = false;
  cancelAnimationFrame(animId);
  sfx('gameover');
  if (musicOn) stopMusic();
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('tetris_hi', highScore);
    document.getElementById('hi-display').textContent = highScore;
    document.getElementById('new-record').style.display = 'block';
  } else {
    document.getElementById('new-record').style.display = 'none';
  }
  document.getElementById('final-score').textContent = score;
  document.getElementById('gameover-overlay').style.display = 'flex';
}

function togglePause() {
  if (!gameRunning) return;
  paused = !paused;
  document.getElementById('pause-overlay').style.display = paused ? 'flex' : 'none';
  if (!paused) lastTime = 0;
}

document.addEventListener('keydown', e => {
  if (!gameRunning) return;
  switch (e.key) {
    case 'ArrowLeft':
      if (valid(current.shape, current.x - 1, current.y)) { current.x--; sfx('move'); } break;
    case 'ArrowRight':
      if (valid(current.shape, current.x + 1, current.y)) { current.x++; sfx('move'); } break;
    case 'ArrowDown':
      if (valid(current.shape, current.x, current.y + 1)) { current.y++; dropAcc = 0; } break;
    case 'ArrowUp': case 'z': case 'Z': {
      const r = rotate(current.shape);
      if (valid(r, current.x, current.y)) { current.shape = r; sfx('rotate'); }
      else if (valid(r, current.x - 1, current.y)) { current.shape = r; current.x--; sfx('rotate'); }
      else if (valid(r, current.x + 1, current.y)) { current.shape = r; current.x++; sfx('rotate'); }
      break;
    }
    case ' ':
      while (valid(current.shape, current.x, current.y + 1)) current.y++;
      place(); dropAcc = 0; break;
    case 'p': case 'P': togglePause(); break;
  }
});

function addTouch(id, fn, repeat = true) {
  const el = document.getElementById(id);
  let iv;
  const start = e => { e.preventDefault(); fn(); if (repeat) iv = setInterval(fn, 110); };
  const end = () => clearInterval(iv);
  el.addEventListener('touchstart', start, { passive: false });
  el.addEventListener('touchend', end);
  el.addEventListener('mousedown', () => { fn(); if (repeat) iv = setInterval(fn, 110); });
  el.addEventListener('mouseup', end);
}

addTouch('btn-left', () => { if (gameRunning && !paused && valid(current.shape, current.x - 1, current.y)) { current.x--; sfx('move'); } });
addTouch('btn-right', () => { if (gameRunning && !paused && valid(current.shape, current.x + 1, current.y)) { current.x++; sfx('move'); } });
addTouch('btn-down', () => { if (gameRunning && !paused && valid(current.shape, current.x, current.y + 1)) { current.y++; dropAcc = 0; } });

const doRotate = () => {
  if (!gameRunning || paused) return;
  const r = rotate(current.shape);
  if (valid(r, current.x, current.y)) { current.shape = r; sfx('rotate'); }
  else if (valid(r, current.x - 1, current.y)) { current.shape = r; current.x--; sfx('rotate'); }
  else if (valid(r, current.x + 1, current.y)) { current.shape = r; current.x++; sfx('rotate'); }
};

const doDrop = () => {
  if (!gameRunning || paused) return;
  while (valid(current.shape, current.x, current.y + 1)) current.y++;
  place(); dropAcc = 0;
};

document.getElementById('btn-rotate').addEventListener('touchstart', e => { e.preventDefault(); doRotate(); }, { passive: false });
document.getElementById('btn-rotate').addEventListener('click', doRotate);
document.getElementById('btn-drop').addEventListener('touchstart', e => { e.preventDefault(); doDrop(); }, { passive: false });
document.getElementById('btn-drop').addEventListener('click', doDrop);

let tx, ty;
canvas.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
canvas.addEventListener('touchend', e => {
  if (!gameRunning || paused) return;
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 25 && valid(current.shape, current.x + 1, current.y)) { current.x++; sfx('move'); }
    else if (dx < -25 && valid(current.shape, current.x - 1, current.y)) { current.x--; sfx('move'); }
  } else {
    if (dy > 40) doDrop();
    else if (dy < -30) doRotate();
  }
}, { passive: true });

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

board = createBoard();
draw();
if ('ontouchstart' in window) document.getElementById('touch-controls').style.display = 'flex';
</script>
